<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Report - PrivacySorted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0c1425;
            --navy-mid: #162036;
            --slate: #3d4f6f;
            --slate-light: #6b7c99;
            --teal: #0d9488;
            --teal-dark: #0a7a70;
            --teal-bg: #f0fdfa;
            --red: #c33;
            --red-bg: #fef2f2;
            --amber: #b45309;
            --amber-bg: #fffbeb;
            --green: #15803d;
            --green-bg: #f0fdf4;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --gray-200: #dfe3ea;
            --gray-300: #c4cad6;
            --white: #ffffff;
            --font-serif: 'Source Serif 4', Georgia, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }
        body {
            font-family: var(--font-sans);
            color: var(--navy);
            background: var(--gray-50);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Top bar */
        .topbar {
            background: var(--navy);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar-logo {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
        }
        .topbar-logo span { color: #2dd4bf; }
        .topbar-cta {
            font-size: 13px;
            font-weight: 600;
            color: var(--white);
            background: var(--teal);
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
        }
        .topbar-cta:hover { background: var(--teal-dark); }

        .report-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 28px 64px;
        }

        /* Header */
        .report-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .report-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--teal);
            margin-bottom: 8px;
        }
        .report-header h1 {
            font-family: var(--font-serif);
            font-size: 30px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .report-meta {
            font-size: 13px;
            color: var(--slate-light);
        }

        /* Summary cards row */
        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 18px 16px;
            text-align: center;
        }
        .summary-card .num {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }
        .summary-card .label {
            font-size: 12px;
            font-weight: 500;
            color: var(--slate-light);
        }
        .num-green { color: var(--green); }
        .num-amber { color: var(--amber); }
        .num-red { color: var(--red); }

        /* Status headline */
        .status-bar {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .status-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .status-icon-red { background: var(--red-bg); color: var(--red); }
        .status-icon-amber { background: var(--amber-bg); color: var(--amber); }
        .status-icon-green { background: var(--green-bg); color: var(--green); }
        .status-bar h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .status-bar p {
            font-size: 13px;
            color: var(--slate-light);
        }

        /* CTA banner */
        .cta-banner {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
            border-radius: 12px;
            padding: 28px 28px;
            margin-bottom: 28px;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .cta-banner h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .cta-banner p {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }
        .cta-banner-btn {
            display: inline-block;
            background: var(--teal);
            color: var(--white);
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .cta-banner-btn:hover { background: var(--teal-dark); }

        /* Section headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            margin-top: 8px;
        }
        .section-header h3 {
            font-size: 15px;
            font-weight: 700;
        }
        .section-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .badge-red { background: var(--red-bg); color: var(--red); }
        .badge-amber { background: var(--amber-bg); color: var(--amber); }
        .badge-green { background: var(--green-bg); color: var(--green); }
        .badge-teal { background: var(--teal-bg); color: var(--teal-dark); }

        /* Checklist items */
        .checklist {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--gray-100);
            transition: background 0.15s;
        }
        .check-item:last-child { border-bottom: none; }
        .check-item:hover { background: var(--gray-50); }
        .check-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .dot-red { background: var(--red-bg); color: var(--red); }
        .dot-amber { background: var(--amber-bg); color: var(--amber); }
        .dot-green { background: var(--green-bg); color: var(--green); }
        .check-content { flex: 1; min-width: 0; }
        .check-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .check-desc {
            font-size: 13px;
            color: var(--slate);
        }
        .check-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .tag-policy { background: #e0f2fe; color: #0369a1; }
        .tag-action { background: #fef3c7; color: #92400e; }
        .tag-done { background: var(--green-bg); color: var(--green); }

        /* Action plan */
        .action-plan {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-left: 4px solid var(--teal);
            border-radius: 10px;
            padding: 22px 22px;
            margin-bottom: 24px;
        }
        .action-plan h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--teal-dark);
        }
        .timeline-item {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            font-size: 14px;
            color: var(--slate);
        }
        .timeline-week {
            font-weight: 700;
            color: var(--navy);
            white-space: nowrap;
            min-width: 70px;
        }

        /* ADM callout */
        .adm-callout {
            background: var(--amber-bg);
            border: 1px solid #fde68a;
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 24px;
        }
        .adm-callout .adm-badge {
            font-size: 11px;
            font-weight: 600;
            background: #fde68a;
            color: var(--amber);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .adm-callout h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .adm-callout p {
            font-size: 13px;
            color: var(--slate);
        }

        /* Draft section */
        .draft-section {
            background: var(--white);
            border: 2px solid var(--teal);
            border-radius: 12px;
            padding: 28px;
            margin-top: 8px;
            margin-bottom: 28px;
        }
        .draft-section h2 {
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .draft-subtitle {
            font-size: 14px;
            color: var(--slate-light);
            margin-bottom: 20px;
        }
        .draft-preview {
            position: relative;
            max-height: 280px;
            overflow: hidden;
        }
        .draft-preview-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--slate);
            white-space: pre-wrap;
        }
        .draft-preview::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 180px;
            background: linear-gradient(transparent, var(--white) 85%);
            pointer-events: none;
        }
        .draft-cta-overlay {
            text-align: center;
            padding: 16px 0 0;
        }
        .draft-cta-overlay p {
            font-size: 15px;
            color: var(--navy);
            margin-bottom: 4px;
            font-weight: 600;
        }
        .draft-cta-overlay .price {
            font-size: 28px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 4px;
        }
        .draft-cta-overlay .price-note {
            font-size: 13px;
            color: var(--slate-light);
            margin-bottom: 16px;
        }
        .draft-buy-btn {
            display: inline-block;
            background: var(--teal);
            color: var(--white);
            padding: 14px 36px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .draft-buy-btn:hover { background: var(--teal-dark); }
        .draft-buy-btn:disabled { background: var(--gray-300); cursor: wait; }
        .draft-includes {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--slate-light);
        }
        .draft-includes span::before {
            content: '\2713 ';
            color: var(--teal);
            font-weight: 700;
        }
        .draft-full {
            font-size: 14px;
            line-height: 1.8;
            color: var(--slate);
            white-space: pre-wrap;
        }
        .draft-disclaimer {
            background: var(--gray-100);
            border-radius: 8px;
            padding: 16px;
            font-size: 12px;
            color: var(--slate-light);
            margin-bottom: 16px;
        }
        .draft-generating {
            text-align: center;
            padding: 40px 0;
        }
        .draft-generating .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .draft-generating p { font-size: 15px; color: var(--slate); }
        .draft-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .draft-actions button {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--gray-200);
            background: var(--white);
            color: var(--navy);
        }
        .draft-actions button:hover { background: var(--gray-100); }
        .draft-actions .primary {
            background: var(--teal);
            color: var(--white);
            border-color: var(--teal);
        }
        .draft-actions .primary:hover { background: var(--teal-dark); }

        /* Footer */
        .report-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
        }
        .report-footer p {
            font-size: 13px;
            color: var(--slate-light);
            margin-bottom: 14px;
        }
        .footer-btn {
            display: inline-block;
            background: var(--teal);
            color: var(--white);
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }
        .footer-btn:hover { background: var(--teal-dark); }

        .not-found {
            text-align: center;
            padding: 80px 28px;
        }
        .not-found h1 {
            font-family: var(--font-serif);
            font-size: 28px;
            margin-bottom: 12px;
        }
        .not-found p {
            font-size: 15px;
            color: var(--slate-light);
            margin-bottom: 24px;
        }

        @media (max-width: 600px) {
            .summary-row { grid-template-columns: 1fr; }
            .cta-banner { flex-direction: column; text-align: center; }
            .status-bar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="topbar-logo">Privacy<span>Sorted</span></a>
        <a href="/" class="topbar-cta">Scan your website</a>
    </div>

    <div class="report-container" id="report-container">
        <div class="not-found" id="not-found" style="display:none">
            <h1>Report not found</h1>
            <p>This report may have expired or the URL may be incorrect.</p>
            <a href="/" class="footer-btn">Run a free scan</a>
        </div>
        <div id="report-content"></div>
    </div>

    <script>
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        // APPs that need operational changes beyond just policy text
        const OPERATIONAL_APPS = new Set([1, 7, 11, 12, 13]);
        const OPERATIONAL_LABELS = {
            1: 'Appoint a privacy contact person and set up a complaint process',
            7: 'Set up an unsubscribe mechanism for all marketing emails',
            11: 'Implement security controls, encryption, and a breach response plan',
            12: 'Create an access request process (respond within 30 days)',
            13: 'Create a correction request process (respond within 30 days)',
        };

        async function loadReport() {
            const path = window.location.pathname;
            const match = path.match(/\/report\/([a-z0-9-]+)/);
            if (!match) {
                document.getElementById('not-found').style.display = 'block';
                return;
            }
            const slug = match[1];

            let scan = null;
            // 1) Static JSON, 2) API, 3) localStorage
            try {
                const res = await fetch('/reports/' + encodeURIComponent(slug) + '.json');
                if (res.ok) scan = await res.json();
            } catch (e) {}

            if (!scan || !(scan.analysis?.apps?.length > 0)) {
                try {
                    const res = await fetch('/api/report_data?slug=' + encodeURIComponent(slug));
                    if (res.ok) {
                        const d = await res.json();
                        if (d?.analysis?.apps?.length > 0) scan = d;
                    }
                } catch (e) {}
            }

            if (!scan) {
                const scans = JSON.parse(localStorage.getItem('ps_scans') || '[]');
                scan = scans.find(s => s.slug === slug);
            }

            if (!scan || !scan.analysis) {
                document.getElementById('not-found').style.display = 'block';
                return;
            }

            renderReport(scan);
        }

        function renderReport(scan) {
            const a = scan.analysis;
            const score = scan.score || a.overall_score || 0;
            const businessName = scan.business_name || a.business_name || '';
            const scannedAt = scan.scanned_at || a.analysis_date || '';
            const apps = a.apps || [];
            const slug = scan.slug || '';

            document.title = `${esc(businessName)} - Privacy Act Compliance Report`;

            // Categorize APPs
            const compliant = apps.filter(ap => ap.status === 'COMPLIANT');
            const needsPolicy = apps.filter(ap => ap.status !== 'COMPLIANT' && !OPERATIONAL_APPS.has(ap.app_number));
            const needsAction = apps.filter(ap => ap.status !== 'COMPLIANT' && OPERATIONAL_APPS.has(ap.app_number));
            const totalGaps = apps.length - compliant.length;

            // Status headline
            let statusIcon, statusClass, statusTitle, statusDesc;
            if (score >= 70) {
                statusIcon = '&#10003;'; statusClass = 'status-icon-green';
                statusTitle = 'Looking good';
                statusDesc = 'Your privacy policy covers most requirements. A few areas to tighten up.';
            } else if (score >= 40) {
                statusIcon = '!'; statusClass = 'status-icon-amber';
                statusTitle = 'Partially covered';
                statusDesc = `Your policy addresses some requirements but has ${totalGaps} gaps to fix before the deadline.`;
            } else if (totalGaps === 13) {
                statusIcon = '!'; statusClass = 'status-icon-red';
                statusTitle = 'No privacy policy found';
                statusDesc = 'You need a privacy policy that covers all 13 Australian Privacy Principles.';
            } else {
                statusIcon = '!'; statusClass = 'status-icon-red';
                statusTitle = 'Significant gaps found';
                statusDesc = `${totalGaps} of 13 Privacy Principles need attention. Here's exactly what to fix.`;
            }

            let html = `
                <div class="report-header">
                    <div class="report-label">Privacy Act Compliance Report</div>
                    <h1>${esc(businessName)}</h1>
                    <div class="report-meta">${esc(scan.url || '')} &middot; ${scannedAt ? new Date(scannedAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' }) : ''}</div>
                </div>

                <div class="summary-row">
                    <div class="summary-card">
                        <div class="num ${compliant.length > 0 ? 'num-green' : ''}">${compliant.length}</div>
                        <div class="label">Compliant</div>
                    </div>
                    <div class="summary-card">
                        <div class="num ${needsPolicy.length > 0 ? 'num-amber' : ''}">${needsPolicy.length}</div>
                        <div class="label">Need policy update</div>
                    </div>
                    <div class="summary-card">
                        <div class="num ${needsAction.length > 0 ? 'num-red' : ''}">${needsAction.length}</div>
                        <div class="label">Need action</div>
                    </div>
                </div>

                <div class="status-bar">
                    <div class="status-icon ${statusClass}">${statusIcon}</div>
                    <div>
                        <h2>${statusTitle}</h2>
                        <p>${statusDesc}</p>
                    </div>
                </div>
            `;

            // CTA banner (if there are gaps)
            if (totalGaps > 0) {
                html += `
                    <div class="cta-banner">
                        <div>
                            <h3>Get a compliant privacy policy</h3>
                            <p>Tailored to your business, covering all ${totalGaps} gap${totalGaps !== 1 ? 's' : ''} identified in this report.</p>
                        </div>
                        <a class="cta-banner-btn" href="#draft-section" onclick="scrollToDraft()">Fix this now - $149</a>
                    </div>
                `;
            }

            // Section: Policy update needed
            if (needsPolicy.length > 0) {
                html += `
                    <div class="section-header">
                        <h3>Your privacy policy needs to cover</h3>
                        <span class="section-badge badge-amber">${needsPolicy.length} items</span>
                    </div>
                    <div class="checklist">
                `;
                const priorityOrder = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
                const sorted = [...needsPolicy].sort((x, y) => (priorityOrder[x.priority] || 3) - (priorityOrder[y.priority] || 3));
                sorted.forEach(app => {
                    const rec = (app.recommendations && app.recommendations[0]) || '';
                    const dotClass = app.status === 'NON_COMPLIANT' || app.status === 'NOT_ADDRESSED' ? 'dot-red' : 'dot-amber';
                    const dotIcon = app.status === 'NON_COMPLIANT' || app.status === 'NOT_ADDRESSED' ? '!' : '~';
                    html += `
                        <div class="check-item">
                            <div class="check-dot ${dotClass}">${dotIcon}</div>
                            <div class="check-content">
                                <div class="check-title">APP ${app.app_number}: ${esc(app.app_name)}</div>
                                <div class="check-desc">${esc(rec)}</div>
                            </div>
                            <span class="check-tag tag-policy">Policy update</span>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // Section: Additional actions needed
            if (needsAction.length > 0) {
                html += `
                    <div class="section-header">
                        <h3>You'll also want to set up</h3>
                        <span class="section-badge badge-red">${needsAction.length} items</span>
                    </div>
                    <div class="checklist">
                `;
                needsAction.forEach(app => {
                    const operationalNote = OPERATIONAL_LABELS[app.app_number] || '';
                    const rec = (app.recommendations && app.recommendations[0]) || '';
                    html += `
                        <div class="check-item">
                            <div class="check-dot dot-red">!</div>
                            <div class="check-content">
                                <div class="check-title">APP ${app.app_number}: ${esc(app.app_name)}</div>
                                <div class="check-desc">${esc(operationalNote || rec)}</div>
                            </div>
                            <span class="check-tag tag-action">Action needed</span>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // ADM callout
            const adm = a.adm_check;
            if (adm && adm.recommendation) {
                html += `
                    <div class="adm-callout">
                        <span class="adm-badge">Upcoming &middot; 10 Dec 2026</span>
                        <h4>Automated Decision-Making Transparency</h4>
                        <p>${esc(adm.recommendation)}</p>
                    </div>
                `;
            }

            // Section: Compliant
            if (compliant.length > 0) {
                html += `
                    <div class="section-header">
                        <h3>Already covered</h3>
                        <span class="section-badge badge-green">${compliant.length} items</span>
                    </div>
                    <div class="checklist">
                `;
                compliant.forEach(app => {
                    html += `
                        <div class="check-item">
                            <div class="check-dot dot-green">&#10003;</div>
                            <div class="check-content">
                                <div class="check-title">APP ${app.app_number}: ${esc(app.app_name)}</div>
                                <div class="check-desc">Your policy covers this requirement.</div>
                            </div>
                            <span class="check-tag tag-done">Compliant</span>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // Action Plan (week-by-week)
            const nextSteps = a.next_steps || [];
            if (nextSteps.length > 0) {
                html += `
                    <div class="action-plan">
                        <h3>Your timeline</h3>
                `;
                nextSteps.forEach(step => {
                    const weekMatch = step.match(/^(Week \d+-\d+):\s*(.*)/);
                    if (weekMatch) {
                        html += `
                            <div class="timeline-item">
                                <span class="timeline-week">${esc(weekMatch[1])}</span>
                                <span>${esc(weekMatch[2])}</span>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="timeline-item">
                                <span class="timeline-week">Next</span>
                                <span>${esc(step)}</span>
                            </div>
                        `;
                    }
                });
                html += `</div>`;
            }

            // Draft section
            if (totalGaps > 0) {
                html += `<div class="draft-section" id="draft-section">
                    <h2>Your Drafted Privacy Policy</h2>
                    <div id="draft-body"></div>
                </div>`;
            }

            html += `
                <div class="report-footer">
                    <p>Generated by PrivacySorted. Automated compliance scanning, not legal advice.</p>
                    <a href="/" class="footer-btn">Run another scan</a>
                </div>
            `;

            document.getElementById('report-content').innerHTML = html;

            // Handle draft
            if (totalGaps > 0) {
                const params = new URLSearchParams(window.location.search);
                const isPaid = params.get('paid') === 'true' || scan.paid;
                if (isPaid) {
                    showDraftPolling(slug);
                } else {
                    showDraftPreview(scan);
                }
            }
        }

        function showDraftPreview(scan) {
            const a = scan.analysis;
            const apps = a.apps || [];
            const gapCount = apps.filter(ap => ap.status !== 'COMPLIANT').length;

            const previewLines = [
                `Privacy Policy \u2014 ${esc(scan.business_name || 'Your Business')}`,
                '',
                '1. About This Policy',
                `This privacy policy sets out how ${esc(scan.business_name || 'we')} collect, use, disclose, and manage your personal information in accordance with the Privacy Act 1988 (Cth) and the 13 Australian Privacy Principles (APPs).`,
                '',
                `Our organisation is committed to protecting the privacy of personal information we collect and handle. This policy covers all personal information collected through our website (${esc(scan.url || '')}) and in the course of our business operations.`,
                '',
                '2. Collection of Personal Information',
                'We collect personal information that is reasonably necessary for our business functions and activities. The types of personal information we collect include...',
                '',
                '3. How We Use Your Information',
                'We use personal information collected for the primary purpose for which it was collected, and for related secondary purposes...',
            ];

            document.getElementById('draft-body').innerHTML = `
                <p class="draft-subtitle">AI-generated policy tailored to your ${gapCount} compliance gap${gapCount !== 1 ? 's' : ''}</p>
                <div class="draft-preview">
                    <div class="draft-preview-text">${previewLines.join('\n')}</div>
                </div>
                <div class="draft-cta-overlay">
                    <p>Get your complete, tailored privacy policy</p>
                    <div class="price">$149</div>
                    <div class="price-note">One-time purchase &middot; Instant delivery</div>
                    <button class="draft-buy-btn" id="buy-btn" onclick="startCheckout('${scan.slug}', '${esc(scan.business_name || '')}')">
                        Get Your Privacy Policy + Roadmap
                    </button>
                    <div class="draft-includes">
                        <span>Drafted privacy policy</span>
                        <span>Compliance roadmap</span>
                        <span>Covers all 13 APPs</span>
                    </div>
                </div>
            `;
        }

        async function startCheckout(slug, businessName) {
            const btn = document.getElementById('buy-btn');
            btn.disabled = true;
            btn.textContent = 'Redirecting to checkout...';
            try {
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug, business_name: businessName }),
                });
                const data = await res.json();
                if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Get Your Privacy Policy + Roadmap';
                    alert('Something went wrong. Please try again.');
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Get Your Privacy Policy + Roadmap';
                alert('Connection error. Please try again.');
            }
        }

        async function showDraftPolling(slug) {
            document.getElementById('draft-body').innerHTML = `
                <p class="draft-subtitle">Your purchase is confirmed</p>
                <div class="draft-generating">
                    <div class="spinner"></div>
                    <p>Generating your tailored privacy policy...<br>This usually takes 30\u201360 seconds.</p>
                </div>
            `;
            let attempts = 0;
            const maxAttempts = 60;
            const poll = async () => {
                attempts++;
                try {
                    const res = await fetch('/api/draft_status?slug=' + encodeURIComponent(slug));
                    const data = await res.json();
                    if (data.status === 'ready') { showFullDraft(data.draft_text); return; }
                } catch (e) {}
                if (attempts < maxAttempts) { setTimeout(poll, 3000); }
                else {
                    document.getElementById('draft-body').innerHTML = `
                        <p class="draft-subtitle">Taking longer than expected</p>
                        <p style="font-size:14px;color:var(--slate)">
                            Payment successful. Refresh in a few minutes or contact hello@privacysorted.com.
                        </p>
                    `;
                }
            };
            poll();
        }

        function showFullDraft(draftText) {
            const parts = draftText.split('---');
            const disclaimer = (parts[0] || '').trim();
            const body = (parts.slice(1, -1).join('---') || '').trim();
            const footer = (parts[parts.length - 1] || '').trim();
            document.getElementById('draft-body').innerHTML = `
                <p class="draft-subtitle">Your tailored privacy policy is ready</p>
                <div class="draft-disclaimer">${esc(disclaimer)}</div>
                <div class="draft-full">${esc(body)}</div>
                <div class="draft-disclaimer" style="margin-top:16px">${esc(footer)}</div>
                <div class="draft-actions">
                    <button onclick="copyDraft()">Copy to clipboard</button>
                    <button class="primary" onclick="downloadDraft()">Download as text file</button>
                </div>
            `;
            window._draftText = draftText;
        }

        function copyDraft() {
            if (window._draftText) {
                navigator.clipboard.writeText(window._draftText).then(() => {
                    const btns = document.querySelectorAll('.draft-actions button:not(.primary)');
                    if (btns[0]) { btns[0].textContent = 'Copied!'; setTimeout(() => { btns[0].textContent = 'Copy to clipboard'; }, 2000); }
                });
            }
        }

        function downloadDraft() {
            if (window._draftText) {
                const blob = new Blob([window._draftText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'privacy-policy-draft.txt';
                a.click();
                URL.revokeObjectURL(url);
            }
        }

        function scrollToDraft() {
            const el = document.getElementById('draft-section');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        loadReport().catch(() => {
            document.getElementById('not-found').style.display = 'block';
        });
    </script>
</body>
</html>
