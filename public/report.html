<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Report - PrivacySorted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0c1425;
            --slate: #3d4f6f;
            --slate-light: #6b7c99;
            --teal: #0d9488;
            --teal-dark: #0a7a70;
            --red: #c33;
            --amber: #b45309;
            --green: #15803d;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --gray-200: #dfe3ea;
            --gray-300: #c4cad6;
            --white: #ffffff;
            --font-serif: 'Source Serif 4', Georgia, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }
        body {
            font-family: var(--font-sans);
            color: var(--navy);
            background: var(--gray-50);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            background: var(--navy);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar-logo {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
        }
        .topbar-logo span { color: #2dd4bf; }
        .topbar-cta {
            font-size: 13px;
            font-weight: 600;
            color: var(--white);
            background: var(--teal);
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
        }
        .topbar-cta:hover { background: var(--teal-dark); }

        .report-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 32px 28px 64px;
        }

        .report-header {
            text-align: center;
            margin-bottom: 36px;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--gray-200);
        }
        .report-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--teal);
            margin-bottom: 12px;
        }
        .report-header h1 {
            font-family: var(--font-serif);
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .report-meta {
            font-size: 14px;
            color: var(--slate-light);
        }

        .score-section {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 28px;
        }
        .score-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--white);
            flex-shrink: 0;
        }
        .sc-low { background: var(--red); }
        .sc-mid { background: var(--amber); }
        .sc-high { background: var(--green); }
        .score-text h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .score-text p { font-size: 14px; color: var(--slate-light); }

        .app-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 14px;
        }
        .app-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .app-card h3 {
            font-size: 15px;
            font-weight: 700;
        }
        .app-status {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .st-compliant { background: #f0fdf4; color: var(--green); }
        .st-partial { background: #fffbeb; color: var(--amber); }
        .st-non { background: #fef2f2; color: var(--red); }

        .gap-summary {
            font-size: 14px;
            color: var(--slate);
            margin: 8px 0 4px;
        }
        .rec-text {
            font-size: 13px;
            color: var(--navy);
            padding: 10px 14px;
            background: var(--gray-50);
            border-radius: 6px;
            margin: 8px 0 12px;
        }
        .app-cta {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .app-cta-primary {
            background: var(--teal);
            color: var(--white);
        }
        .app-cta-primary:hover { background: var(--teal-dark); }
        .app-cta-secondary {
            background: var(--gray-100);
            color: var(--navy);
        }
        .app-cta-secondary:hover { background: var(--gray-200); }
        .no-gaps {
            font-size: 13px;
            color: var(--slate-light);
            margin-top: 4px;
        }

        .report-footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 28px;
            border-top: 1px solid var(--gray-200);
        }
        .report-footer p {
            font-size: 14px;
            color: var(--slate-light);
            margin-bottom: 16px;
        }
        .cta-btn {
            display: inline-block;
            background: var(--teal);
            color: var(--white);
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
        }
        .cta-btn:hover { background: var(--teal-dark); }

        .draft-section {
            background: var(--white);
            border: 2px solid var(--teal);
            border-radius: 10px;
            padding: 28px;
            margin-top: 28px;
            position: relative;
        }
        .draft-section h2 {
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .draft-section .draft-subtitle {
            font-size: 14px;
            color: var(--slate-light);
            margin-bottom: 20px;
        }
        .draft-preview {
            position: relative;
            max-height: 320px;
            overflow: hidden;
        }
        .draft-preview-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--slate);
            white-space: pre-wrap;
        }
        .draft-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(transparent, var(--white) 85%);
            pointer-events: none;
        }
        .draft-cta-overlay {
            text-align: center;
            padding: 16px 0 0;
        }
        .draft-cta-overlay p {
            font-size: 15px;
            color: var(--navy);
            margin-bottom: 4px;
            font-weight: 600;
        }
        .draft-cta-overlay .price {
            font-size: 28px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 4px;
        }
        .draft-cta-overlay .price-note {
            font-size: 13px;
            color: var(--slate-light);
            margin-bottom: 16px;
        }
        .draft-buy-btn {
            display: inline-block;
            background: var(--teal);
            color: var(--white);
            padding: 14px 36px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .draft-buy-btn:hover { background: var(--teal-dark); }
        .draft-buy-btn:disabled {
            background: var(--gray-300);
            cursor: wait;
        }
        .draft-includes {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--slate-light);
        }
        .draft-includes span::before {
            content: '\2713 ';
            color: var(--teal);
            font-weight: 700;
        }
        .draft-full {
            font-size: 14px;
            line-height: 1.8;
            color: var(--slate);
            white-space: pre-wrap;
        }
        .draft-full h3, .draft-full strong {
            color: var(--navy);
        }
        .draft-disclaimer {
            background: var(--gray-100);
            border-radius: 8px;
            padding: 16px;
            font-size: 12px;
            color: var(--slate-light);
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .draft-generating {
            text-align: center;
            padding: 40px 0;
        }
        .draft-generating .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .draft-generating p {
            font-size: 15px;
            color: var(--slate);
        }
        .draft-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .draft-actions button {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--gray-200);
            background: var(--white);
            color: var(--navy);
        }
        .draft-actions button:hover { background: var(--gray-100); }
        .draft-actions .primary {
            background: var(--teal);
            color: var(--white);
            border-color: var(--teal);
        }
        .draft-actions .primary:hover { background: var(--teal-dark); }

        .not-found {
            text-align: center;
            padding: 80px 28px;
        }
        .not-found h1 {
            font-family: var(--font-serif);
            font-size: 28px;
            margin-bottom: 12px;
        }
        .not-found p {
            font-size: 15px;
            color: var(--slate-light);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="topbar-logo">Privacy<span>Sorted</span></a>
        <a href="/" class="topbar-cta">Scan your website</a>
    </div>

    <div class="report-container" id="report-container">
        <div class="not-found" id="not-found" style="display:none">
            <h1>Report not found</h1>
            <p>This report may have expired or the URL may be incorrect.</p>
            <a href="/" class="cta-btn">Run a free scan</a>
        </div>
        <div id="report-content"></div>
    </div>

    <script>
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        async function loadReport() {
            // Extract slug from URL path: /report/slug-name
            const path = window.location.pathname;
            const match = path.match(/\/report\/([a-z0-9-]+)/);
            if (!match) {
                document.getElementById('not-found').style.display = 'block';
                return;
            }
            const slug = match[1];

            // Try: 1) static JSON file, 2) API storage, 3) localStorage
            // Static files are always up-to-date with latest engine format.
            let scan = null;
            try {
                const res = await fetch('/reports/' + encodeURIComponent(slug) + '.json');
                if (res.ok) {
                    scan = await res.json();
                }
            } catch (e) {}

            if (!scan || !(scan.analysis?.apps?.length > 0)) {
                try {
                    const res = await fetch('/api/report_data?slug=' + encodeURIComponent(slug));
                    if (res.ok) {
                        const apiData = await res.json();
                        if (apiData?.analysis?.apps?.length > 0) {
                            scan = apiData;
                        }
                    }
                } catch (e) {}
            }

            if (!scan) {
                const scans = JSON.parse(localStorage.getItem('ps_scans') || '[]');
                scan = scans.find(s => s.slug === slug);
            }

            if (!scan || !scan.analysis) {
                document.getElementById('not-found').style.display = 'block';
                return;
            }

            const a = scan.analysis;
            // Normalize: API result has score inside analysis, localStorage has it at top level
            const score = scan.score || a.overall_score || 0;
            const businessName = scan.business_name || a.business_name || '';
            const scannedAt = scan.scanned_at || a.analysis_date || '';
            const apps = a.apps || [];
            const scoreClass = score < 40 ? 'sc-low' : score < 70 ? 'sc-mid' : 'sc-high';
            const statusMap = { 'COMPLIANT': 'Low Risk', 'PARTIALLY_COMPLIANT': 'Moderate Risk', 'NON_COMPLIANT': 'High Risk' };
            const statusText = statusMap[a.overall_status] || (a.overall_status || '').replace(/_/g, ' ');

            document.title = `${esc(businessName)} - Privacy Act Compliance Report`;

            const priorityOrder = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
            const sorted = [...apps].sort((x, y) => (priorityOrder[x.priority] || 3) - (priorityOrder[y.priority] || 3));

            let html = `
                <div class="report-header">
                    <div class="report-label">PRIVACY ACT COMPLIANCE REPORT</div>
                    <h1>${esc(businessName)}</h1>
                    <div class="report-meta">${esc(scan.url)} &middot; Scanned ${scannedAt ? new Date(scannedAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' }) : ''}</div>
                </div>

                <div class="score-section">
                    <div class="score-circle ${scoreClass}">${score}</div>
                    <div class="score-text">
                        <h2>${statusText}</h2>
                        <p>${apps.filter(ap => ap.status !== 'COMPLIANT').length} of ${apps.length} Australian Privacy Principles have gaps</p>
                    </div>
                </div>
            `;

            // Action Plan section
            const nextSteps = a.next_steps || [];
            const appRecs = sorted.filter(ap => ap.status !== 'COMPLIANT' && ap.recommendations && ap.recommendations.length > 0);
            if (nextSteps.length > 0 || appRecs.length > 0) {
                html += `<div class="app-card" style="border-left:4px solid var(--teal);margin-bottom:28px">
                    <h3 style="font-size:18px;margin-bottom:12px">Recommended Action Plan</h3>`;

                if (nextSteps.length > 0) {
                    html += `<ol style="padding-left:20px;margin-bottom:12px;font-size:14px;color:var(--slate)">
                        ${nextSteps.map(s => `<li style="padding:4px 0">${esc(s)}</li>`).join('')}
                    </ol>`;
                }

                if (appRecs.length > 0) {
                    html += `<p style="font-size:13px;font-weight:600;margin:12px 0 8px;color:var(--navy)">Per-Principle Recommendations</p>`;
                    html += appRecs.map(ap => {
                        return `<div style="margin-bottom:8px;padding:10px 12px;background:var(--gray-50);border-radius:6px">
                            <div style="font-size:13px;font-weight:700;margin-bottom:4px">APP ${ap.app_number}: ${esc(ap.app_name || '')}</div>
                            <div style="font-size:13px;color:var(--slate)">${ap.recommendations.map(r => esc(r)).join(' ')}</div>
                        </div>`;
                    }).join('');
                }

                html += `</div>`;
            }

            html += sorted.map(app => {
                const stClass = app.status === 'COMPLIANT' ? 'st-compliant' : app.status === 'PARTIALLY_COMPLIANT' ? 'st-partial' : 'st-non';
                const stLabel = app.status === 'COMPLIANT' ? 'Compliant' : app.status === 'PARTIALLY_COMPLIANT' ? 'Needs Work' : 'Action Required';
                const gaps = app.gaps || [];
                const recs = app.recommendations || [];

                let body = '';
                if (app.status === 'COMPLIANT') {
                    body = '<p class="no-gaps">Your policy covers this requirement.</p>';
                } else {
                    // Show consolidated gap summary (1 line)
                    if (gaps.length > 0) {
                        body += `<p class="gap-summary">${esc(gaps[0])}</p>`;
                    }
                    // Show recommendation
                    if (recs.length > 0) {
                        body += `<p class="rec-text"><strong>What to do:</strong> ${esc(recs[0])}</p>`;
                    }
                    // CTA button based on APP type
                    body += getAppCTA(app.app_number, app.status);
                }

                return `<div class="app-card">
                    <div class="app-card-header">
                        <h3>APP ${app.app_number}: ${esc(app.app_name)}</h3>
                        <span class="app-status ${stClass}">${stLabel}</span>
                    </div>
                    ${body}
                </div>`;
            }).join('');

            function getAppCTA(appNum, status) {
                // CTA mapping: which APPs can we solve with our product vs external guidance
                const ctaMap = {
                    // Privacy policy content gaps - we can generate this
                    1:  { primary: 'Update Your Privacy Policy', type: 'policy' },
                    2:  { primary: 'Update Your Privacy Policy', type: 'policy' },
                    3:  { primary: 'Update Your Privacy Policy', type: 'policy' },
                    4:  { primary: 'Update Your Privacy Policy', type: 'policy' },
                    5:  { primary: 'Update Your Privacy Policy', type: 'policy' },
                    6:  { primary: 'Update Your Privacy Policy', type: 'policy' },
                    7:  { primary: 'Update Your Privacy Policy', type: 'policy', secondary: 'Guide: Email Marketing Compliance', guide: 'marketing' },
                    8:  { primary: 'Update Your Privacy Policy', type: 'policy', secondary: 'Guide: Cloud & Overseas Data', guide: 'overseas' },
                    9:  { primary: 'Update Your Privacy Policy', type: 'policy' },
                    10: { primary: 'Update Your Privacy Policy', type: 'policy' },
                    11: { primary: 'Update Your Privacy Policy', type: 'policy', secondary: 'Guide: Data Security Basics', guide: 'security' },
                    12: { primary: 'Update Your Privacy Policy', type: 'policy' },
                    13: { primary: 'Update Your Privacy Policy', type: 'policy' },
                };
                const cta = ctaMap[appNum] || { primary: 'Update Your Privacy Policy', type: 'policy' };
                let html = `<div style="display:flex;gap:8px;flex-wrap:wrap;">`;
                html += `<a class="app-cta app-cta-primary" href="#draft-section" onclick="scrollToDraft()">${cta.primary}</a>`;
                if (cta.secondary) {
                    html += `<a class="app-cta app-cta-secondary" href="/guides/${cta.guide}" target="_blank">${cta.secondary}</a>`;
                }
                html += `</div>`;
                return html;
            }

            // Draft section: blurred preview (unpaid) or full draft (paid)
            const hasGaps = apps.some(ap => ap.status !== 'COMPLIANT');
            if (hasGaps) {
                html += `<div class="draft-section" id="draft-section">
                    <h2>Your Drafted Privacy Policy</h2>
                    <div id="draft-body"></div>
                </div>`;
            }

            html += `
                <div class="report-footer">
                    <p>This report was generated by PrivacySorted, an automated Privacy Act compliance scanner.</p>
                    <a href="/" class="cta-btn">Run your own free scan</a>
                </div>
            `;

            document.getElementById('report-content').innerHTML = html;

            // Handle draft section state
            if (hasGaps) {
                const params = new URLSearchParams(window.location.search);
                const isPaid = params.get('paid') === 'true' || scan.paid;

                if (isPaid) {
                    showDraftPolling(slug);
                } else {
                    showDraftPreview(scan);
                }
            }
        }

        function showDraftPreview(scan) {
            const a = scan.analysis;
            const apps = a.apps || [];
            const gapCount = apps.filter(ap => ap.status !== 'COMPLIANT').length;

            // Generate preview text from gaps
            const previewLines = [
                `Privacy Policy — ${esc(scan.business_name || 'Your Business')}`,
                '',
                '1. About This Policy',
                `This privacy policy sets out how ${esc(scan.business_name || 'we')} collect, use, disclose, and manage your personal information in accordance with the Privacy Act 1988 (Cth) and the 13 Australian Privacy Principles (APPs).`,
                '',
                `Our organisation is committed to protecting the privacy of personal information we collect and handle. This policy covers all personal information collected through our website (${esc(scan.url || '')}) and in the course of our business operations.`,
                '',
                '2. Collection of Personal Information',
                'We collect personal information that is reasonably necessary for our business functions and activities. The types of personal information we collect include...',
                '',
                '3. How We Use Your Information',
                'We use personal information collected for the primary purpose for which it was collected, and for related secondary purposes...',
            ];

            document.getElementById('draft-body').innerHTML = `
                <p class="draft-subtitle">AI-generated policy tailored to your ${gapCount} compliance gaps</p>
                <div class="draft-preview">
                    <div class="draft-preview-text">${previewLines.join('\n')}</div>
                </div>
                <div class="draft-cta-overlay">
                    <p>Get your complete, tailored privacy policy</p>
                    <div class="price">$149</div>
                    <div class="price-note">One-time purchase &middot; Instant delivery</div>
                    <button class="draft-buy-btn" id="buy-btn" onclick="startCheckout('${scan.slug}', '${esc(scan.business_name || '')}')">
                        Get Your Privacy Policy + Roadmap
                    </button>
                    <div class="draft-includes">
                        <span>Drafted privacy policy</span>
                        <span>Compliance roadmap PDF</span>
                        <span>Covers all 13 APPs</span>
                    </div>
                </div>
            `;
        }

        async function startCheckout(slug, businessName) {
            const btn = document.getElementById('buy-btn');
            btn.disabled = true;
            btn.textContent = 'Redirecting to checkout...';

            try {
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug, business_name: businessName }),
                });
                const data = await res.json();

                if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Get Your Privacy Policy + Roadmap';
                    alert('Something went wrong. Please try again.');
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Get Your Privacy Policy + Roadmap';
                alert('Connection error. Please try again.');
            }
        }

        async function showDraftPolling(slug) {
            document.getElementById('draft-body').innerHTML = `
                <p class="draft-subtitle">Your purchase is confirmed</p>
                <div class="draft-generating">
                    <div class="spinner"></div>
                    <p>Generating your tailored privacy policy...<br>This usually takes 30–60 seconds.</p>
                </div>
            `;

            // Poll for draft
            let attempts = 0;
            const maxAttempts = 60; // 3 minutes at 3s intervals

            const poll = async () => {
                attempts++;
                try {
                    const res = await fetch('/api/draft_status?slug=' + encodeURIComponent(slug));
                    const data = await res.json();

                    if (data.status === 'ready') {
                        showFullDraft(data.draft_text);
                        return;
                    }
                } catch (e) {}

                if (attempts < maxAttempts) {
                    setTimeout(poll, 3000);
                } else {
                    document.getElementById('draft-body').innerHTML = `
                        <p class="draft-subtitle">Your policy is taking longer than expected</p>
                        <p style="font-size:14px;color:var(--slate)">
                            Your payment was successful. Please refresh this page in a few minutes,
                            or contact us at hello@privacysorted.com if the issue persists.
                        </p>
                    `;
                }
            };

            poll();
        }

        function showFullDraft(draftText) {
            // Split disclaimer from policy body
            const parts = draftText.split('---');
            const disclaimer = (parts[0] || '').trim();
            const body = (parts.slice(1, -1).join('---') || '').trim();
            const footer = (parts[parts.length - 1] || '').trim();

            document.getElementById('draft-body').innerHTML = `
                <p class="draft-subtitle">Your tailored privacy policy is ready</p>
                <div class="draft-disclaimer">${esc(disclaimer)}</div>
                <div class="draft-full">${esc(body)}</div>
                <div class="draft-disclaimer" style="margin-top:16px">${esc(footer)}</div>
                <div class="draft-actions">
                    <button onclick="copyDraft()">Copy to clipboard</button>
                    <button class="primary" onclick="downloadDraft()">Download as text file</button>
                </div>
            `;

            // Store for download/copy
            window._draftText = draftText;
        }

        function copyDraft() {
            if (window._draftText) {
                navigator.clipboard.writeText(window._draftText).then(() => {
                    const btns = document.querySelectorAll('.draft-actions button:not(.primary)');
                    if (btns[0]) { btns[0].textContent = 'Copied!'; setTimeout(() => { btns[0].textContent = 'Copy to clipboard'; }, 2000); }
                });
            }
        }

        function downloadDraft() {
            if (window._draftText) {
                const blob = new Blob([window._draftText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'privacy-policy-draft.txt';
                a.click();
                URL.revokeObjectURL(url);
            }
        }

        function scrollToDraft() {
            const el = document.getElementById('draft-section');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        loadReport().catch(() => {
            document.getElementById('not-found').style.display = 'block';
        });
    </script>
</body>
</html>
